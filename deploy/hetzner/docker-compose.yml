services:
  api:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    command: pnpm --filter backend start
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "4000"
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    command: pnpm --filter backend worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openstat}
      POSTGRES_USER: ${POSTGRES_USER:-openstat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN}
      APP_WEB_URL: ${APP_WEB_URL}
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
